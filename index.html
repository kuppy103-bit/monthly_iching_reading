<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今月の易経ミニ占い</title>
<style>
  body {
    background: #fff9e6; 
    font-family: 'Arial', 'ヒラギノ角ゴ', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    text-align: center;
    margin: 0;
  }
  
  h1 {
    color: #ff007d; /* タイトルの色（ピンク） */
    font-size: 26px;
    margin: 30px 0 10px;
  }

  #fortune {
    width: 100%;
    max-width: 600px;
    margin-bottom: 30px;
    color: #666;
    font-size: 16px;
    white-space: nowrap;
  }

  #fortune.revealed {
    text-align: left;
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    border: 2px dashed #ff99cc;
    font-size: 18px; 
    color: #333;
    white-space: normal;
    box-sizing: border-box;
  }

  #drawBtn {
    padding: 15px 30px;
    border: none;
    border-radius: 10px;
    background: #ffb366; /* ボタンをオレンジ系にしました */
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 20px;
  }

  .hidden {
    display: none;
  }

  .info-text {
    color: #ff007d;
    font-size: 14px !important;
    display: block;
    margin-top: 20px;
  }
</style>
</head>
<body>

  <h1>🌸易経ミニ占い🌸</h1>
  <div id="fortune">今月のあなたへのメッセージ</div>
  <button id="drawBtn">受け取る</button>

<script>
// JavaScriptの内容は以前と同じため中略しますが、
// これまでのコードの <script> 以降をそのままお使いいただけます。
const info = '<br><br><span class="info-text">🔮読んでいて感じたとが本当のメッセージかもしれません。<br>　あなたの気づきに繋がりますように・・・💖</span>';

const fortunes = [
`<p><strong>乾為天<br>（けんいてん）</strong><br>今月はエネルギーに満ちあふれる絶好調な1ヶ月！高い目標を掲げて、迷わず突き進んでみてください。ただし、独りよがりにならないよう周囲の意見に耳を傾ける余裕がさらなる成功を呼びます。${info}</p>`,
  `<p><strong>坤為地<br>（こんいち）</strong><br>今月は「育てる・支える」ことがテーマ。表舞台に立つより、裏方に徹して周囲をサポートすることで、結果的にあなたへの信頼が大きく高まります。焦らず、土壌を耕すような気持ちで過ごして。${info}</p>`,
  `<p><strong>水雷屯<br>（すいらいちゅん）</strong><br>新しいことを始めたくなる時期ですが、産みの苦しみを感じるかも。今は無理に形にしようとせず、じっくりと基礎固めを。今月の踏ん張りが、来月以降の大きな芽吹きに繋がります。${info}</p>`,
  `<p><strong>山水蒙<br>（さんすいもう）</strong><br>霧の中にいるような感覚になったら、信頼できる目上の人や専門家に教えを請うのが吉。素直な心で学ぶことで、月の中盤には視界がパッと開けてくるはずです。${info}</p>`,
  `<p><strong>水天需<br>（すいてんじゅ）</strong><br>今月は「待機」が最大の戦略です。準備は万全にしておきつつ、チャンスが来るまでゆったりとした心で構えていてください。焦って動くよりも、英気を養うことで幸運を掴めます。${info}</p>`,
  `<p><strong>天水訟<br>（てんすいしょう）</strong><br>対人関係で意見の食い違いが起こりやすい月。正論を振りかざして戦うよりも、一歩引いて妥協点を見つけるのが賢明です。「勝ち」より「和」を優先して穏やかに過ごしましょう。${info}</p>`,
  `<p><strong>地水師<br>（ちすいし）</strong><br>少し責任の重い役割が回ってくるかもしれません。覚悟を決めてリーダーシップを発揮することで、周囲をまとめ上げることができる時。規律正しく、誠実な行動がピンチをチャンスに変えます。${info}</p>`,
  `<p><strong>水地比<br>（すいちひ）</strong><br>人との交流が活発になり、楽しい1ヶ月になりそう。新しいネットワークを広げたり、親しい人と親睦を深めたりするのに最適です。協力し合うことで、一人ではできない成果を出せるでしょう。${info}</p>`,
  `<p><strong>風天小畜<br>（ふうてんしょうちく）</strong><br>物事がトントン拍子には進まないかもしれませんが、それは「足踏み」ではなく「準備」の期間。小さな改善を積み重ねることで、後半に向けて少しずつ運気が好転していきます。${info}</p>`,
  `<p><strong>天澤履<br>（てんたくり）</strong><br>礼儀やマナー、言葉遣いを普段以上に意識したい月。少し背伸びが必要な場面でも、丁寧な振る舞いを心がければ、大きなトラブルを回避し、周囲からの評価を高められます。${info}</p>`,
  `<p><strong>地天泰<br>（ちてんたい）</strong><br>心身ともに安定し、公私ともに充実する安泰な1ヶ月。この調和を維持するために、身近な人への感謝を言葉にして伝え続けましょう。平和な時こそ、次のステップへの準備も忘れずに。${info}</p>`,
  `<p><strong>天地否<br>（てんちひ）</strong><br>意思疎通がうまくいかず、停滞感を感じやすい時期。今は無理に状況を変えようとせず、自分磨きや趣味に没頭して「冬ごもり」の期間と割り切りましょう。無理をしないことが一番の防御です。${info}</p>`,
  `<p><strong>天火同人<br>（てんかどうじん）</strong><br>志を同じくする仲間との出会いや協力が期待できる月。オープンな心で外の世界へ飛び出してみましょう。共通の目標を持つことで、絆が深まり素晴らしい結果を共有できます。${info}</p>`,
  `<p><strong>火天大有<br>（かてんたいゆう）</strong><br>今までの努力が報われ、大きな実りを得られる収穫期！豊かな運気に恵まれますが、成功を独り占めせず周囲に還元することで、その幸運はさらに長く持続します。${info}</p>`,
  `<p><strong>地山謙<br>（ちざんけん）</strong><br>謙虚さが最大の武器になる1ヶ月。実力があってもひけらかさず、常に一歩下がる姿勢が周りからの強力なバックアップを引き寄せます。内面の充実が自然と輝き出す時です。${info}</p>`,
  `<p><strong>雷地豫<br>（らいちよ）</strong><br>喜びや楽しみが多く、活気に満ちた月になります。やってみたい計画があるなら、今月中に具体化させてみて。ただし、浮かれすぎて準備を怠らないよう、足元もしっかり確認して。${info}</p>`,
  `<p><strong>澤雷随<br>（たくらいずい）</strong><br>今月は「流れに乗る」ことが開運の秘訣。自分のこだわりを一度横に置いて、周囲の提案や時代のトレンドに合わせて動いてみましょう。柔軟な対応が、思いがけない幸運な場所へ連れて行ってくれます。${info}</p>`,
  `<p><strong>山風蠱<br>（さんぷうこ）</strong><br>停滞していた問題や、見て見ぬふりをしてきた課題を清算する絶好のタイミング。今月中に「大掃除」を済ませることで、淀んでいた運気が一気に流れ出し、清々しい毎日が戻ってきます。${info}</p>`,
  `<p><strong>地澤臨<br>（ちたくりん）</strong><br>運気がぐんぐん上昇していく勢いのある月。チャンスが次々と舞い込むので、迷わず掴みに行きましょう。ただし、好調な時ほど調子に乗りすぎず、長期的な視点を持つことが成功の鍵です。${info}</p>`,
  `<p><strong>風地観<br>（ふうちかん）</strong><br>立ち止まって全体を見渡すことが大切な1ヶ月。目先の利益に惑わされず、本質を見極める洞察力を養いましょう。落ち着いて観察することで、次に進むべき正しい道が自然と見えてきます。${info}</p>`,
  `<p><strong>火雷噬嗑<br>（からいぜいごう）</strong><br>邪魔が入ったり、難しい問題に直面したりするかもしれませんが、毅然とした態度で突破すべき時。曖昧にせず、白黒はっきりさせる勇気が、淀んだ状況を打破する力になります。${info}</p>`,
  `<p><strong>山火賁<br>（さんかひ）</strong><br>今月は「彩り」を大切に。外見を整えたり、身の回りを美しく装飾したりすることで心が整います。華やかな中にも、しっかりとした内面の実力（中身）を伴わせる努力を忘れずに。${info}</p>`,
  `<p><strong>山地剝<br>（さんちはく）</strong><br>エネルギーが低下気味なので、今月は無理をせず「守り」に徹しましょう。余計なものを手放し、シンプルに過ごすことが重要。静かに休息をとることで、新しいサイクルのための蓄えができます。${info}</p>`,
  `<p><strong>地雷復<br>（ちらいふく）</strong><br>一度諦めたことや、停滞していた物事に再び光が差す月。リスタートを切るのに最適なタイミングです。急ぎすぎず、一歩ずつ確実に進むことで、徐々に本来の調子を取り戻せます。${info}</p>`,
  `<p><strong>天雷无妄<br>（てんらいむもう）</strong><br>作為を捨て、流れに身を任せる「自然体」が幸運を呼びます。無理に結果を求めず、今目の前にあることに無心で取り組んでみて。予想外の形で嬉しいギフトが届くかもしれません。${info}</p>`,
  `<p><strong>山天大畜<br>（さんてんたいちく）</strong><br>大きなパワーを蓄積できる時期。今は表立って動くよりも、知識を詰め込んだりスキルを磨いたりして自分を強化しましょう。蓄えたエネルギーは、いずれ強力な武器となってあなたを助けます。${info}</p>`,
  `<p><strong>山雷頤<br>（さんらいい）</strong><br>「養う」ことがテーマの月。健康的な食事を心がけ、前向きな言葉を発するようにしましょう。自分だけでなく、周囲の人にも元気を与えられるような言動が、あなた自身の運気を押し上げます。${info}</p>`,
  `<p><strong>澤風大過<br>（たくふうたいか）</strong><br>重圧を感じやすい月。キャパシティを超えそうな時は、無理をせず周囲に相談するか、優先順位をつけ直しましょう。適度な息抜きを意識して、心のバランスを保つことが何より大切です。${info}</p>`,
  `<p><strong>坎為水<br>（かんいすい）</strong><br>困難を感じやすい時期ですが、ここは「心の修練」の時。どんなに暗い夜でも必ず明けます。今は現状を冷静に受け入れ、自分を信じて耐え抜くことで、精神的に大きく成長できるでしょう。${info}</p>`,
  `<p><strong>離為火<br>（りいか）</strong><br>知性が冴え渡り、隠れた真実が見えてくる月。情熱的に行動できる時ですが、感情の起伏が激しくなりがちなので注意が必要です。冷静な判断力を保つことで、あなたの才能が正しく評価されます。${info}</p>`,
  `<p><strong>澤山咸<br>（たくざんかん）</strong><br>感受性が豊かになり、人との共鳴が深まる素晴らしい月。理屈よりも直感や「ワクワクする気持ち」を大切にして行動してみて。素敵な出会いや感動が、あなたを待っています。${info}</p>`,
  `<p><strong>雷風恒<br>（らいふうこう）</strong><br>変化を求めるよりも、これまでの継続を大切にしたい時。ルーティンを淡々とこなす姿勢が、大きな信頼と安定に繋がります。長く続けてきたことに自信を持って、足元を固めて過ごしましょう。${info}</p>`,
  `<p><strong>天山遁<br>（てんざんとん）</strong><br>引き際が肝心な1ヶ月。不利な状況や合わない環境からは、潔く距離を置くのが賢い選択です。一歩引くことで、自分自身を守り、次のチャンスに向けてエネルギーを温存できます。${info}</p>`,
  `<p><strong>雷天大壮<br>（らいてんたいそう）</strong><br>エネルギー全開で、一気に物事を進められるパワーのある月。ただし、勢い余って暴走しないよう「自制心」を常に持ち歩きましょう。正義感もほどほどに、調和を意識して進むのが吉。${info}</p>`,
  `<p><strong>火地晋<br>（かちしん）</strong><br>日の出のような勢いで、物事がスピーディーに発展していく月。自信を持って積極的にアピールしていきましょう。あなたの明るいエネルギーが周囲を惹きつけ、強力なバックアップを得られます。${info}</p>`,
  `<p><strong>地火明夷<br>（ちかめいい）</strong><br>今は才能や実力を隠し、目立たず過ごすのが賢明な月。不遇を感じても腐らず、内面で静かに情熱の火を灯し続けましょう。夜明けは必ず来ます。今は無理に動かないのが正解です。${info}</p>`,
  `<p><strong>風火家人<br>（ふうかかじん）</strong><br>身近な場所を整えることが開運の近道。家族や親友との関係を深めたり、住環境を快適にしたりすることで、外の世界でも力が発揮できるようになります。足元を固めることが全ての基本です。${info}</p>`,
  `<p><strong>火澤睽<br>（かたくけい）</strong><br>周囲と意見が食い違い、孤独を感じるかもしれませんが、それは「個性を磨く」チャンス。無理に合わせようとせず、小さな共通点から協力の糸口を探りましょう。適度な距離感が成功の秘訣です。${info}</p>`,
  `<p><strong>水山蹇<br>（すいざんけん）</strong><br>目の前に壁を感じ、思うように進めないかもしれません。無理に突破しようとせず、一度引き返して別のルートを探すか、仲間の助けを借りましょう。焦りは禁物。今は賢く足踏みをする時です。${info}</p>`,
  `<p><strong>雷水解<br>（らいすいかい）</strong><br>「解」は解決と解放。長く苦しんだ難題が解ける月です。解決したら速やかに元の生活に戻り、残っている小さな問題も今のうちに一掃してしまいましょう。スピード感が吉を呼びます。${info}</p>`,
  `<p><strong>山澤損<br>（さんたくそん）</strong><br>目先の損得にとらわれず、まずは「与える」ことを意識してみて。奉仕の精神が、回り回ってあなたに大きな幸運をもたらします。欲を手放し、心を軽くすることで、新しい運気が入る隙間が生まれます。${info}</p>`,
  `<p><strong>風雷益<br>（ふうらいえき）</strong><br>公私ともにメリットが多く、大きなプラスが得られる絶好調な月！積極的に行動を起こし、周りにもその恩恵を分け与えることで、運気はさらに加速します。新しい挑戦には最高のタイミング。${info}</p>`,
  `<p><strong>澤天夬<br>（たくてんかい）</strong><br>決断を下す時が来ました。迷いを断ち切り、勇気を持って一歩踏み出しましょう。ただし、強引になりすぎると周囲の反感を買うので、丁寧な説明と優しさをセットにするのが成功のコツです。${info}</p>`,
  `<p><strong>天風姤<br>（てんぷうこう）</strong><br>思いがけない出会いや出来事が舞い込む月。直感的なワクワクは大切ですが、甘い誘惑には裏がある可能性も。一時の感情に流されず、冷静に相手や状況を観察する冷静さを持ち合わせて。${info}</p>`,
  `<p><strong>澤地萃<br>（たくちすい）</strong><br>人、物、情報が集まってくる華やかな1ヶ月。パーティーやイベントなど、人が集まる場所へ積極的に出向いてみましょう。感謝の気持ちを忘れずに接することで、将来に繋がる強力な縁が結ばれます。${info}</p>`,
  `<p><strong>地風升<br>（ちふうしょう）</strong><br>着実にステップアップできる上昇運の月。派手さはありませんが、日々の積み重ねが確実に実を結びます。目標に向かってコツコツと努力を続けることで、月が終わる頃には確かな手応えを感じるはず。${info}</p>`,
  `<p><strong>澤水困<br>（たくすいこん）</strong><br>少し精神的に追い込まれるような場面があるかもしれませんが、ここは「心の強さ」を試される時。言葉を慎み、今はじっと静かに過ごして。困難の中で見つけた気づきが、後のあなたの宝になります。${info}</p>`,
  `<p><strong>水風井<br>（すいふうせい）</strong><br>変わらない日常の中にこそ、大切なものがあると気づける月。自分にできることを淡々と、丁寧に続けましょう。あなたの変わらぬ誠実さが、周囲の喉を潤す井戸のように頼りにされ、運気が安定します。${info}</p>`,
  `<p><strong>澤火革<br>（たくかかく）</strong><br>今月は「リニューアル」がテーマ！古い習慣や考え方を思い切って変えることで、運気が劇的に好転します。現状維持にこだわらず、変化の波を積極的に楽しむ姿勢が、新しい扉を開きます。${info}</p>`,
  `<p><strong>火風鼎<br>（かふうてい）</strong><br>協力体制を築くことで、大きな成果を生み出せる月。一人で頑張りすぎず、仲間の才能をうまく組み合わせてみましょう。三位一体となって取り組めば、物事は理想的な形で安定し、完成へと向かいます。${info}</p>`,
  `<p><strong>震為雷<br>（しんいらい）</strong><br>予期せぬ変化やニュースに驚かされるかもしれませんが、動揺しなくて大丈夫。大きな音に驚くことはあっても、実害は少ない時です。落ち着いて状況を見極めれば、速やかに平静を取り戻せます。${info}</p>`,
  `<p><strong>艮為山<br>（ごんいさん）</strong><br>「止まる」ことに意味がある1ヶ月。無理に進もうとせず、現状をキープすることに専念しましょう。自分自身を深く見つめ直す時間を持つことで、次に進むべきタイミングを正しく判断できます。${info}</p>`,
  `<p><strong>風山漸<br>（ふうざんぜん）</strong><br>今月は「急がば回れ」。着実に、順序を守って進むことが成功への最短ルートです。無理な飛び級はせず、一歩一歩のプロセスを大切に。時間はかかっても、最終的には理想の場所に到達できます。${info}</p>`,
  `<p><strong>雷澤帰妹<br>（らいたくきまい）</strong><br>衝動的な行動や、目先の楽しさに流されやすい月。何かを決める前には必ず「これは本当に正しい順番か？」と自問自答を。感情に振り回されず、道理を通すことで後悔を防げます。${info}</p>`,
  `<p><strong>雷火豊<br>（らいかほう）</strong><br>運気は最高潮！溢れるエネルギーをフル活用して、やりたいことを一気に形にしましょう。ただし、盛者必衰の理を忘れず、好調な時こそ周囲への配慮を。充実した今を全力で楽しんでください。${info}</p>`,
  `<p><strong>火山旅<br>（かざんりょ）</strong><br>いつもと違う環境に身を置くことで、新しい気づきが得られる月。心細さを感じることもあるかもしれませんが、その「旅」のような不安定さを楽しんで。謙虚に振る舞うことが、旅先での助けに繋がります。${info}</p>`,

function drawFortune() {
  const randomIndex = Math.floor(Math.random() * fortunes.length);
  const fortuneDisplay = document.getElementById("fortune");
  const btn = document.getElementById("drawBtn");
  
  fortuneDisplay.innerHTML = fortunes[randomIndex];
  fortuneDisplay.classList.add("revealed");
  btn.classList.add("hidden");
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById("drawBtn").addEventListener("click", drawFortune);
</script>
